<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Bootstrap demo</title>
    <style>
        .container{
            background-color:rgba(104, 137, 237, 0.637) ;
        }
    </style>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">
  </head>
  <body>
    <div class="container">
        <h1>container</h1>
        <p>fixed width,centre align with margin</p>
    </div>
    <div class=" container-fluid bg-warning">
        <h1>container-fluid </h1>
        <p>and always 100 percent width and span over the full screen at all size</p>
    </div>
    <div class="container-lg bg-info">
        <h1>container break-point</h1>
        <p>full width untill the break point after that fixed width</p>
    </div>
  </body>
</html>
