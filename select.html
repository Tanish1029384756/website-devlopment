<!DOCTYPE html>
<html>
    <head>
        <title>My Birthday</title>
        <style>
            body{
                background: linear-gradient(45deg, red,yellow,blue,orange,pink,green,cyan,purple);
            }
            *{
                text-align: center;
                margin:35px ;
                padding:0
            }
            input[type="text"]{
                border:4px solid rgb(9, 0, 0);
            }
            button:hover{
                background:green;
                transform: scale(1.3);
            }
            
            h1::first-letter{
                font-size: 125%;
            }
        </style>
    </head>
    <body>
        <h1>Happy birthday🎉</h1>
        <p>hello,my name is Tanish.today is my birthday and i become 11 years old.
            my favourite game is Football.
        </p>
        <h2>Invitation to my birthday party.</h2>
        <form>
            <fieldset>
                <legend>INVITATION</legend>
                <label>Enter your name</label>
                <input type="text">
                <br>
                <label>Enter your age</label>
                <input type="number">
                <br>
                <button>Click me to teleport to party</button>
            </fieldset>
        </form>
    </body>
</html>
